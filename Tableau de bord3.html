<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crunchyroll Analytics Dashboard - Expert</title>
    <style>
        :root { --orange: #f47521; --bg: #141519; --card: #23252b; --text: #ffffff; --green: #27ae60; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.5; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        h1 { color: var(--orange); text-align: center; border-bottom: 2px solid var(--orange); padding-bottom: 10px; margin-bottom: 30px; }

        /* Zone de dépôt */
        .drop-zone { border: 2px dashed var(--orange); padding: 30px; text-align: center; border-radius: 12px; background: var(--card); cursor: pointer; transition: 0.3s; margin-bottom: 25px; }
        .drop-zone:hover { background: #2d3038; border-color: #fff; }

        /* En-tête Statistiques */
        .stats-header { display: none; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-box { background: var(--card); padding: 20px; border-radius: 10px; border-bottom: 4px solid var(--orange); text-align: center; }
        .stat-box small { color: #aaa; text-transform: uppercase; font-size: 0.8em; letter-spacing: 1px; }
        .stat-box div { font-size: 2em; font-weight: bold; color: var(--orange); margin-top: 5px; }

        /* Bouton Sauvegarde */
        .save-bar { text-align: right; margin-bottom: 20px; display: none; }
        .btn-save { background: var(--green); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1em; transition: 0.2s; }
        .btn-save:hover { background: #219150; transform: translateY(-2px); }

        /* Liste des Séries */
        .series-item { background: var(--card); margin-bottom: 15px; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .series-header { padding: 18px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: background 0.2s; }
        .series-header:hover { background: #2d3038; }
        
        .title-group { flex: 1; }
        .series-title { font-weight: bold; font-size: 1.2em; color: var(--orange); display: block; }
        .series-meta { font-size: 0.85em; color: #ccc; }
        
        .progress-group { display: flex; align-items: center; gap: 20px; }
        .progress-container { width: 120px; height: 8px; background: #141519; border-radius: 4px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--orange); width: 0%; transition: width 0.6s cubic-bezier(0.1, 0, 0.3, 1); }

        .badge { font-size: 0.75em; padding: 4px 10px; border-radius: 12px; font-weight: bold; min-width: 100px; text-align: center; }
        .status-done { background: var(--green); color: white; }
        .status-progress { background: #2980b9; color: white; }

        /* Contenu Détail (Masqué par défaut) */
        .series-content { display: none; padding: 20px; background: #1c1e23; border-top: 1px solid #3d414d; }
        .season-block { margin-bottom: 25px; }
        .season-title { font-size: 1.1em; font-weight: bold; margin-bottom: 12px; display: block; border-left: 3px solid var(--orange); padding-left: 10px; }
        
        .episode-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
        .episode-card { background: #2d3038; padding: 8px 12px; border-radius: 5px; font-size: 0.85em; display: flex; justify-content: space-between; align-items: center; }
        .ep-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px; }
        .ep-lang { color: var(--orange); font-weight: bold; font-size: 0.8em; opacity: 0.8; }

        @media print { .drop-zone, .btn-save { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <h1>Crunchyroll Dashboard <span style="font-weight: 300;">Analytics</span></h1>
    
    <div class="drop-zone" id="dropZone">
        <strong>Glissez vos fichiers JSON ou export .HAR ici</strong><br>
        <small>(Analyse instantanée et locale)</small>
        <input type="file" id="fileInput" multiple style="display:none">
    </div>

    <div class="save-bar" id="saveBar">
        <button class="btn-save" onclick="sauvegarderHTML()">💾 Enregistrer le rapport complet (.html)</button>
    </div>

    <div class="stats-header" id="headerStats">
        <div class="stat-box"><small>Total Épisodes</small><div id="totalEps">0</div></div>
        <div class="stat-box"><small>Saisons Vues</small><div id="totalSaisons">0</div></div>
        <div class="stat-box"><small>Temps Passé</small><div id="totalTime">0h</div></div>
    </div>

    <div id="mainContainer"></div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    let seriesData = {};

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFiles(e.target.files);
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = "#fff"; };
    dropZone.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };

    function handleFiles(files) {
        seriesData = {};
        let processed = 0;
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const json = JSON.parse(e.target.result);
                    const items = json.log ? extractFromHar(json) : (json.data || json.items || []);
                    processItems(items);
                } catch(err) { console.error("Erreur fichier:", file.name); }
                if(++processed === files.length) render();
            };
            reader.readAsText(file);
        });
    }

    function extractFromHar(har) {
        let allItems = [];
        har.log.entries.forEach(entry => {
            if (entry.request.url.includes("watch-history")) {
                try {
                    const content = JSON.parse(entry.response.content.text);
                    allItems.push(...(content.data || content.items || []));
                } catch(e) {}
            }
        });
        return allItems;
    }

    function processItems(items) {
        items.forEach(item => {
            const m = item.panel?.episode_metadata || item.episode_metadata || item.metadata || item;
            const sTitle = m.series_title || "Inconnu";
            const sNum = m.season_number || 1;
            const epNum = m.episode_number || 0;
            const epId = m.episode_id || (sTitle + "_S" + sNum + "_E" + epNum);

            if (!seriesData[sTitle]) {
                seriesData[sTitle] = { totalMs: 0, seasons: {} };
            }
            if (!seriesData[sTitle].seasons[sNum]) {
                seriesData[sTitle].seasons[sNum] = { episodes: {}, maxEp: 0 };
            }

            if (!seriesData[sTitle].seasons[sNum].episodes[epId]) {
                seriesData[sTitle].seasons[sNum].episodes[epId] = {
                    title: m.episode_title || "Épisode " + epNum,
                    num: epNum,
                    lang: m.audio_locale === 'ja-JP' ? 'VO' : (m.audio_locale === 'fr-FR' ? 'VF' : m.audio_locale)
                };
                seriesData[sTitle].seasons[sNum].maxEp = Math.max(seriesData[sTitle].seasons[sNum].maxEp, epNum);
                seriesData[sTitle].totalMs += (m.duration_ms || 0);
            }
        });
    }

    function render() {
        const container = document.getElementById('mainContainer');
        const sorted = Object.entries(seriesData).sort((a,b) => b[1].totalMs - a[1].totalMs);
        
        let globalEps = 0, globalSaisons = 0, globalMs = 0;

        container.innerHTML = sorted.map(([name, data]) => {
            const seasons = Object.entries(data.seasons).sort((a,b) => a[0] - b[0]);
            globalSaisons += seasons.length;
            globalMs += data.totalMs;

            let seriesEpCount = 0;
            let seriesMaxEp = 0;
            seasons.forEach(([_, sData]) => {
                seriesEpCount += Object.keys(sData.episodes).length;
                seriesMaxEp = Math.max(seriesMaxEp, sData.maxEp);
            });
            globalEps += seriesEpCount;

            const isDone = seriesEpCount >= seriesMaxEp && seriesMaxEp > 0;
            const safeName = name.replace(/'/g, "\\'").replace(/"/g, "&quot;");

            return `
                <div class="series-item">
                    <div class="series-header" onclick="toggleContent('${safeName}')">
                        <div class="title-group">
                            <span class="series-title">${name}</span>
                            <span class="series-meta">${seasons.length} Saison(s) • ${seriesEpCount} épisodes • ${(data.totalMs/3600000).toFixed(1)}h</span>
                        </div>
                        <div class="progress-group">
                            <span class="badge ${isDone ? 'status-done' : 'status-progress'}">
                                ${isDone ? 'COMPLÉTÉE' : 'EN COURS'}
                            </span>
                            <div class="progress-container">
                                <div class="progress-bar" style="width: ${Math.min(100, (seriesEpCount/seriesMaxEp)*100)}%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="series-content" id="detail-${name}">
                        ${seasons.map(([sNum, sData]) => `
                            <div class="season-block">
                                <span class="season-title">Saison ${sNum}</span>
                                <div class="episode-grid">
                                    ${Object.values(sData.episodes).sort((a,b) => a.num - b.num).map(ep => `
                                        <div class="episode-card">
                                            <span class="ep-name"><b>E${ep.num}</b> ${ep.title}</span>
                                            <span class="ep-lang">${ep.lang}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }).join('');

        // Update Stats
        document.getElementById('totalEps').innerText = globalEps;
        document.getElementById('totalSaisons').innerText = globalSaisons;
        document.getElementById('totalTime').innerText = Math.round(globalMs/3600000) + "h";
        
        document.getElementById('headerStats').style.display = 'grid';
        document.getElementById('saveBar').style.display = 'block';
        document.getElementById('dropZone').style.padding = '15px';
    }

    function toggleContent(id) {
        const el = document.getElementById('detail-' + id);
        if (el) el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function sauvegarderHTML() {
        const rapport = document.documentElement.outerHTML;
        const blob = new Blob([rapport], { type: 'text/html' });
        const a = document.createElement('a');
        const filename = `Crunchyroll_Rapport_${new Date().toISOString().split('T')[0]}.html`;
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
    }
</script>

</body>
</html>
